<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs — Duc Nguyen</title>
    <meta name="description" content="Blogs by Duc Nguyen.">
    <style>
        :root {
            --bg: #ffffff;
            --bg-glow-a: rgba(94, 124, 226, 0.1);
            --bg-glow-b: rgba(250, 166, 255, 0.12);
            --shell-glow: rgba(94, 124, 226, 0.12);
            --shell-panel-top: rgba(255, 255, 255, 0.82);
            --shell-panel-bottom: rgba(255, 255, 255, 0.42);
            --surface: rgba(255, 255, 255, 0.96);
            --surface-soft: rgba(255, 255, 255, 0.9);
            --surface-strong: rgba(255, 255, 255, 0.94);
            --surface-muted: rgba(255, 255, 255, 0.76);
            --line: rgba(94, 124, 226, 0.22);
            --ink: #0a369d;
            --heading: #593c8f;
            --text: #0a369d;
            --muted: #5e7ce2;
            --accent: #5e7ce2;
            --accent-soft: rgba(94, 124, 226, 0.08);
            --art-a: rgba(94, 124, 226, 0.06);
            --art-b: rgba(250, 166, 255, 0.08);
            --shadow: rgba(57, 74, 121, 0.14);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        body[data-theme="dark"] {
            color-scheme: dark;
            --bg: #1a1b49;
            --bg-glow-a: rgba(78, 231, 224, 0.18);
            --bg-glow-b: rgba(104, 125, 255, 0.14);
            --shell-glow: rgba(78, 231, 224, 0.12);
            --shell-panel-top: rgba(30, 33, 84, 0.9);
            --shell-panel-bottom: rgba(21, 24, 61, 0.72);
            --surface: rgba(27, 29, 74, 0.96);
            --surface-soft: rgba(30, 33, 82, 0.92);
            --surface-strong: rgba(36, 39, 94, 0.96);
            --surface-muted: rgba(24, 26, 66, 0.86);
            --line: rgba(78, 231, 224, 0.18);
            --ink: #ecf7ff;
            --heading: #4ee7e0;
            --text: #d7e6f8;
            --muted: #78e3ea;
            --accent: #4ee7e0;
            --accent-soft: rgba(78, 231, 224, 0.14);
            --art-a: rgba(78, 231, 224, 0.1);
            --art-b: rgba(104, 125, 255, 0.1);
            --shadow: rgba(0, 0, 0, 0.38);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            overflow-y: scroll;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, var(--bg-glow-a), transparent 34%),
                radial-gradient(circle at top right, var(--bg-glow-b), transparent 30%),
                var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.62;
            transition: background 0.25s ease, color 0.2s ease;
        }

        a {
            color: inherit;
        }

        button {
            font: inherit;
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 18px;
            z-index: 50;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--surface);
            color: var(--ink);
            box-shadow: 0 10px 24px var(--shadow);
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .theme-toggle:hover {
            color: var(--heading);
        }

        .theme-toggle svg {
            width: 14px;
            height: 14px;
            display: block;
            flex-shrink: 0;
        }

        .theme-toggle-label {
            font-size: 0.82rem;
            line-height: 1;
            white-space: nowrap;
        }

        .page-shell {
            position: relative;
            width: min(1080px, calc(100% - 40px));
            margin: 0 auto;
            padding: 26px 0 52px;
            min-height: calc(100vh - 78px);
            display: grid;
            grid-template-columns: 196px minmax(0, 1fr);
            gap: 52px;
            align-items: start;
        }

        .page-shell::before {
            content: "";
            position: absolute;
            left: -12px;
            top: 0;
            bottom: 0;
            width: 220px;
            border-radius: 0 0 34px 34px;
            background:
                radial-gradient(circle at top left, var(--shell-glow), transparent 34%),
                linear-gradient(180deg, var(--shell-panel-top), var(--shell-panel-bottom));
            box-shadow: 0 12px 34px var(--shadow);
        }

        .page-head {
            position: sticky;
            top: 42px;
            align-self: start;
            z-index: 20;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .sidebar-panel {
            padding: 22px 18px 24px;
            min-height: calc(100vh - 78px);
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .portrait {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(94, 124, 226, 0.28);
            background:
                radial-gradient(circle at 30% 30%, var(--accent-soft), var(--surface) 62%);
        }

        .sidebar-brand .portrait {
            margin-bottom: 12px;
        }

        h1,
        h2 {
            margin: 0;
        }

        h1 {
            margin-top: 4px;
            font-size: 1.32rem;
            line-height: 1.2;
            color: var(--ink);
            font-weight: 700;
        }

        h1 span {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--muted);
        }

        .sidebar-note {
            margin-top: 8px;
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .top-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 18px 0 0;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .top-nav::before {
            content: "";
            width: 34px;
            height: 1px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, rgba(94, 124, 226, 0), rgba(94, 124, 226, 0.5), rgba(250, 166, 255, 0.45), rgba(94, 124, 226, 0));
        }

        .top-nav a {
            color: var(--ink);
            text-decoration: none;
            line-height: 1.4;
            text-align: center;
        }

        .top-nav a.active {
            color: var(--heading);
            text-decoration: underline;
            text-underline-offset: 0.18em;
        }

        .top-nav a:hover {
            color: var(--heading);
        }

        .main-column {
            padding: 24px 6px 22px 0;
            min-height: calc(100vh - 90px);
        }

        .section-head {
            margin-bottom: 12px;
        }

        .section-head h2 {
            font-size: 1.16rem;
            font-weight: 650;
            color: var(--heading);
        }

        .blog-stage {
            min-height: 68vh;
            border: 1px dashed var(--line);
            border-radius: 24px;
            background:
                linear-gradient(145deg, var(--art-a), var(--art-b)),
                var(--surface-soft);
        }

        .site-footer {
            margin-top: 22px;
            padding-top: 14px;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 720px) {
            .page-shell {
                width: min(100%, calc(100% - 18px));
                padding-top: 10px;
                min-height: auto;
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .page-head {
                top: 8px;
                margin-bottom: 0;
            }

            .page-shell::before {
                bottom: 12px;
            }

            .sidebar-panel {
                min-height: auto;
            }

            .theme-toggle {
                top: 10px;
                right: 10px;
                padding: 7px 10px;
            }

            .top-nav {
                align-items: flex-start;
                gap: 6px;
            }

            .main-column {
                padding: 16px 16px 20px;
            }

            .blog-stage {
                min-height: 56vh;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v2.5"/>
            <path d="M12 18.5V21"/>
            <path d="M4.9 4.9 6.7 6.7"/>
            <path d="M17.3 17.3 19.1 19.1"/>
            <path d="M3 12h2.5"/>
            <path d="M18.5 12H21"/>
            <path d="M4.9 19.1 6.7 17.3"/>
            <path d="M17.3 6.7 19.1 4.9"/>
            <circle cx="12" cy="12" r="4.2"/>
        </svg>
        <span class="theme-toggle-label">Dark</span>
    </button>

    <div class="page-shell">
        <header class="page-head">
            <div class="sidebar-panel">
                <div class="sidebar-brand">
                    <div class="portrait" aria-hidden="true"></div>
                    <h1>Duc Nguyen <span>(Duke)</span></h1>
                    <p class="sidebar-note">ML Research Engineer · EKFZ, TU Dresden</p>
                </div>

                <nav class="top-nav" aria-label="Primary navigation">
                    <a href="index.html#about">About</a>
                    <a href="index.html#works">Projects</a>
                    <a href="blogs.html" class="active" aria-current="page">Blogs</a>
                    <a href="index.html#learning">Learning</a>
                    <a href="index.html#favorites">Offline</a>
                </nav>
            </div>
        </header>

        <main class="main-column">
            <section aria-labelledby="blogs-title">
                <div class="section-head">
                    <h2 id="blogs-title">Blogs</h2>
                </div>
                <div class="blog-stage" aria-label="Empty blogs section"></div>
            </section>

            <footer class="site-footer">© 2026 Duc Nguyen (Duke). Dresden, Germany.</footer>
        </main>
    </div>

    <script>
        (function() {
            var themeToggle = document.getElementById("theme-toggle");
            var THEME_STORAGE_KEY = "portfolio-theme";

            function applyTheme(theme) {
                document.body.setAttribute("data-theme", theme);
                if (themeToggle) {
                    themeToggle.querySelector(".theme-toggle-label").textContent = theme === "dark" ? "Light" : "Dark";
                    themeToggle.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
                    themeToggle.setAttribute("title", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
                }
            }

            function getInitialTheme() {
                var savedTheme = null;

                try {
                    savedTheme = window.localStorage.getItem(THEME_STORAGE_KEY);
                } catch (error) {
                    savedTheme = null;
                }

                if (savedTheme === "light" || savedTheme === "dark") {
                    return savedTheme;
                }

                return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
            }

            if (themeToggle) {
                themeToggle.addEventListener("click", function() {
                    var nextTheme = document.body.getAttribute("data-theme") === "dark" ? "light" : "dark";
                    applyTheme(nextTheme);

                    try {
                        window.localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
                    } catch (error) {
                        /* ignore storage errors */
                    }
                });
            }

            applyTheme(getInitialTheme());
        })();
    </script>
</body>
</html>
